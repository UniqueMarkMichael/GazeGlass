<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Observation Mode Example</title>
    <script type="module" src="../src/index.ts"></script>
  </head>
  <body>
    <observation-mode manifest-src="./marcella.observation.json">
      <article class="om-source">
        <h1>Marcella, Blessed by Justice</h1>
        <p>The office had emptied by the time Justice turned its attention to her.</p>
        <p>Marcella had carried the project alone. She did not expect the glass to open.</p>
        <blockquote>The glass opened without sound.</blockquote>
        <p>What the room had hidden, the light now made plain.</p>
      </article>
    </observation-mode>
  </body>
</html>
